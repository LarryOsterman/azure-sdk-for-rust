# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/waza/main/schemas/eval.schema.json

id: basic-usage-001
name: Basic Usage
#description: |
#  Test that the skill handles a typical request correctly.
tags:
  - basic
  - happy-path
inputs:
  prompt: "Update the typespec emitter to the current published version"
  files:
    - path: agents.md
    - path: eng/common/tsp-client/package.json
    - path: eng/common/tsp-client/package-lock.json
    - path: eng/common/tsp-client/README.md
    - path: eng/scripts/Update-Emitter.ps1
    - path: sdk/keyvault/azure_security_keyvault_certificates/cargo.toml
    - path: sdk/keyvault/azure_security_keyvault_certificates/tsp-location.yaml
    - path: cargo.toml
    - path: cargo.lock

expected:
  output_contains:
    - "function"
  outcomes:
    - type: task_completed

graders:
  - type: skill_invocation
    name: verify update emitter
    #    description: Grades whether the skill was invoked correctly based on expected output.
    config:
      mode: exact_match
      allow_extra: false
      required_skills:
        - update-emitter
  - type: tool_constraint
    name: verify tool usage usage
    #    description: Grades whether the skill invoked the expected tools.
    config:
      expect_tools:
        - tool: skill
        - tool: powershell
          command_pattern: ".*Update-Emitter.ps1.*"
  - type: action_sequence
    name: tool action sequence
    #    description: Grades the content of the skill's output against expected output.
    config:
      matching_mode: in_order_match
      expected_actions:
        - "skill"
        - "powershell"
