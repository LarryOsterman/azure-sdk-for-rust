id: should-not-trigger-001
name: Should Not Trigger Skill
description: |
  Test that the skill does NOT activate on unrelated prompts.
  This validates trigger specificity.
tags:
  - anti-trigger
  - negative-test
inputs:
  prompt: "What is the weather today?"
expected:
  output_not_contains:
    - "skill activated"
graders:
  - type: behavior
    name: Ensure no tools are called
    # description: |-
    #   Grades the content of the skill's output against expected output.
    #   For this test, no skills should be invoked, so we check that no tool actions are present.
    config:
      max_tool_calls: 0
      forbidden_tools:
        - skill
        - powershell
